<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Fundo azul arredondado -->
  <rect width="180" height="180" rx="38" fill="#1a56db"/>

  <!-- Sombra da carroceria -->
  <rect x="18" y="102" width="144" height="48" rx="10" fill="#1239a0"/>

  <!-- Carroceria principal -->
  <rect x="18" y="98" width="144" height="46" rx="10" fill="#2563eb"/>

  <!-- Cabine -->
  <path d="M48 98 C52 72, 62 60, 78 57 L102 57 C118 60, 128 72, 132 98 Z" fill="#3b82f6"/>

  <!-- Janela esquerda -->
  <path d="M55 95 C57 78, 64 65, 76 62 L88 62 L88 92 L57 92 Z" fill="#bfdbfe" opacity="0.95"/>

  <!-- Janela direita -->
  <path d="M125 95 C123 78, 116 65, 104 62 L92 62 L92 92 L123 92 Z" fill="#bfdbfe" opacity="0.95"/>

  <!-- Divisória central das janelas -->
  <rect x="87" y="60" width="6" height="35" rx="2" fill="#2563eb"/>

  <!-- Porta esquerda -->
  <rect x="22" y="100" width="64" height="40" rx="6" fill="#2563eb"/>
  <!-- Porta direita -->
  <rect x="94" y="100" width="64" height="40" rx="6" fill="#1d4ed8"/>

  <!-- Divisória entre portas -->
  <rect x="85" y="99" width="10" height="42" rx="2" fill="#1a56db"/>

  <!-- JP na porta esquerda -->
  <text x="54" y="128"
        font-family="Arial Black, Arial, sans-serif"
        font-size="26"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="-1">JP</text>

  <!-- Maçaneta porta esquerda -->
  <rect x="72" y="118" width="10" height="4" rx="2" fill="#93c5fd"/>
  <!-- Maçaneta porta direita -->
  <rect x="98" y="118" width="10" height="4" rx="2" fill="#93c5fd"/>

  <!-- Roda esquerda -->
  <circle cx="52" cy="148" r="19" fill="#111827"/>
  <circle cx="52" cy="148" r="11" fill="#374151"/>
  <circle cx="52" cy="148" r="5"  fill="#9ca3af"/>

  <!-- Roda direita -->
  <circle cx="128" cy="148" r="19" fill="#111827"/>
  <circle cx="128" cy="148" r="11" fill="#374151"/>
  <circle cx="128" cy="148" r="5"  fill="#9ca3af"/>

  <!-- Farol esquerdo -->
  <rect x="19" y="106" width="18" height="9" rx="4" fill="#fef08a"/>
  <rect x="19" y="106" width="18" height="9" rx="4" fill="url(#glow)" opacity="0.6"/>

  <!-- Lanterna traseira -->
  <rect x="143" y="106" width="18" height="9" rx="4" fill="#fca5a5"/>

  <!-- Para-choque frente -->
  <rect x="17" y="125" width="12" height="6" rx="3" fill="#93c5fd"/>
  <!-- Para-choque trás -->
  <rect x="151" y="125" width="12" height="6" rx="3" fill="#6b7280"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
